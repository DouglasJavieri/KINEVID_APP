<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="40" cy="40" r="37" fill="url(#logoGrad)" filter="url(#glow)"/>
  <circle cx="40" cy="40" r="37" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <!-- Cruz médica -->
  <rect x="33" y="20" width="14" height="40" rx="4" fill="white" opacity="0.95"/>
  <rect x="20" y="33" width="40" height="14" rx="4" fill="white" opacity="0.95"/>
</svg>

