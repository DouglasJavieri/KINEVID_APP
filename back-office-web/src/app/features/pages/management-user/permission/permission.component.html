<knv-page-layout mode="card">

  <!-- ── Encabezado: breadcrumbs ─────────────────────────────────────────── -->
  <knv-page-layout-header>
    <knv-breadcrumbs
      [crumbs]="[{ name: 'Gestión de Usuarios' }]"
      current="Permisos">
    </knv-breadcrumbs>
  </knv-page-layout-header>

  <!-- ── Contenido principal ─────────────────────────────────────────────── -->
  <knv-page-layout-content>
    <knv-list name="Permisos" [withFilter]="false">

      <!-- Botón de agregar (visible solo si tiene permiso) -->
      <div class="actions">
        <button
          *ngIf="actions['createAction']"
          mat-menu-item
          (click)="createPermission()">
          <mat-icon color="primary" class="mr5">add_circle</mat-icon>
          Agregar Permiso
        </button>
      </div>

      <!-- Tabla paginada con filtros -->
      <div fxLayout="row wrap">
        <div fxFlex="100" class="table-scroll" *ngIf="actions['listAction']">

          <knv-server-paging-table
            [dataSource]="dataSource"
            [columns]="columns"
            [requestPaginatedData]="requestPermissionListFn"
            [itemFormatterFn]="itemPermissionFormatterFn"
            [rowActions]="rowActions"
            [eventManager]="tableEvents"
            [pageSizeOptions]="pageSizeOptions"
            [hasFilters]="true">

            <!-- Panel de filtros (expansible) -->
            <form [formGroup]="form" (ngSubmit)="applyFilter()">
              <div fxLayout="row wrap">

                <!-- Filtro por estado -->
                <div fxFlex="25" fxFlex.lt-md="100" class="p5">
                  <mat-form-field appearance="outline" style="width: 100%">
                    <mat-label>Estado</mat-label>
                    <mat-select formControlName="status">
                      <mat-option [value]="null">Todos</mat-option>
                      <mat-option
                        *ngFor="let opt of statusOptions"
                        [value]="opt.value">
                        {{ opt.label }}
                      </mat-option>
                    </mat-select>
                  </mat-form-field>
                </div>

              </div>

              <!-- Botones del filtro -->
              <div fxLayout="row" fxLayoutAlign="start center" style="gap: 10px; padding: 5px">
                <button mat-flat-button color="accent" type="submit">
                  Buscar
                </button>
                <button mat-stroked-button color="accent" type="button" (click)="clearFilter()">
                  Limpiar
                </button>
              </div>
            </form>

          </knv-server-paging-table>
        </div>
      </div>

    </knv-list>
  </knv-page-layout-content>

</knv-page-layout>
