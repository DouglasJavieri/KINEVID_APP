spring.application.name=kinevidApp

# ----------------------------
# DATASOURCE (PostgreSQL)
# ----------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/fisioterapia_kinevid
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# ----------------------------
# JPA / HIBERNATE
# ----------------------------
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

# Desactivar open-in-view (no necesario en API REST, evita WARN)
spring.jpa.open-in-view=false

# ----------------------------
# SERVIDOR
# ----------------------------
server.port=8080
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ----------------------------
# SEGURIDAD JWT - KINEVID
# ----------------------------
kinevid.app.jwtSecret=oPt+wNNxyDE1KFvzNsLo4428/xeOPU+PcJy/PPMYoEZOZx7FvyCQjY2sUEMIlF8ntexVyq7EQfwtY4FMrkjnSA==
kinevid.app.jwtAccessTokenExpirationMs=600000
kinevid.app.jwtRefreshTokenExpirationMs=604800000

# ----------------------------
# En producci\u00F3n usar variables de entorno o secrets manager
# NUNCA subir este archivo con credenciales reales al repositorio
# ----------------------------
kinevid.app.admin.username=admin
kinevid.app.admin.email=douvan.22@gmail.com
kinevid.app.admin.password=Abc123**
kinevid.app.admin.role=ROLE_ADMIN

# ----------------------------
# CORS
# ----------------------------
kinevid.app.cors.allowed-origins=http://localhost:4200

# ----------------------------
# LOGGING \u2014 silenciar WARNs de configuraci\u00F3n esperados
# ----------------------------
# El AuthenticationProvider expl\u00EDcito en SecurityConfig es intencional
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR
# Silenciar deprecation de PostgreSQLDialect (Hibernate lo selecciona autom\u00E1ticamente)
logging.level.org.hibernate.orm.deprecation=ERROR
